INHERIT: docs/mkdocs-base.yml

site_name: TinyCTA
site_url: https://tschm.github.io/TinyCTA/
repo_url: https://github.com/tschm/TinyCTA
repo_name: tschm/TinyCTA

docs_dir: docs

nav:
  - Home: index.md
  - API Reference:
      - Oscillator: api/osc.md
      - EWMA: api/ewma.md
      - Utilities: api/util.md
      - Signal: api/signal.md
      - Linear Algebra: api/linalg.md
      - Config: api/config.md
      - Engine: api/engine.md
      - Hyperparameter Optimisation: api/hyper.md
  - Development:
      - Tests: development/TESTS.md
  - CI/CD:
      - coverage: reports/html-coverage/index.html
      - report: reports/html-report/report.html

plugins:
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
